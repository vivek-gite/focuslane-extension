name: Firefox Extension CI/CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  firefox-extension:
    name: Validate, package, and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint extension
        run: npm run lint

      - name: Build unsigned extension package
        run: npm run build

      - name: Upload unsigned extension package
        uses: actions/upload-artifact@v4
        with:
          name: focuslane-firefox-unsigned
          path: artifacts/*.zip
          if-no-files-found: error

      - name: Verify release tag matches manifest version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          manifest_version="$(node -p "require('./manifest.json').version")"

          if [ "$tag_version" != "$manifest_version" ]; then
            echo "Release tag v${tag_version} does not match manifest.json version ${manifest_version}."
            exit 1
          fi

      - name: Verify AMO credentials are configured
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [ -z "${WEB_EXT_API_KEY}" ] || [ -z "${WEB_EXT_API_SECRET}" ]; then
            echo "Missing AMO_JWT_ISSUER or AMO_JWT_SECRET GitHub repository secret."
            exit 1
          fi
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}

      - name: Submit listed extension to AMO
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run publish:amo
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
