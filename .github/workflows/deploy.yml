name: Browser Extension CI/CD

on:
  push:
    branches:
      - main
  release:
    types:
      - published

jobs:
  browser-extension:
    name: Validate, package, and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint extension
        run: npm run lint

      - name: Build unsigned extension package
        run: npm run build

      - name: Upload unsigned extension package
        uses: actions/upload-artifact@v7
        with:
          name: focuslane-firefox-unsigned
          path: artifacts/*.zip
          if-no-files-found: error

      - name: Build Chrome unpacked extension
        run: npm run build:chrome

      - name: Upload Chrome unpacked extension
        uses: actions/upload-artifact@v7
        with:
          name: focuslane-chrome-unpacked
          path: dist/chrome
          if-no-files-found: error

      - name: Verify release tag matches manifest version
        if: github.event_name == 'release'
        run: |
          release_tag="${RELEASE_TAG}"

          if [[ ! "$release_tag" =~ ^v[0-9]+(\.[0-9]+)*$ ]]; then
            echo "Release tag ${release_tag} must start with v and match the manifest version, for example v2.0.1."
            exit 1
          fi

          tag_version="${release_tag#v}"
          manifest_version="$(node -p "require('./manifest.json').version")"

          if [ "$tag_version" != "$manifest_version" ]; then
            echo "Release tag v${tag_version} does not match manifest.json version ${manifest_version}."
            exit 1
          fi
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}

      - name: Verify AMO credentials are configured
        if: github.event_name == 'release'
        run: |
          if [ -z "${WEB_EXT_API_KEY}" ] || [ -z "${WEB_EXT_API_SECRET}" ]; then
            echo "Missing AMO_JWT_ISSUER or AMO_JWT_SECRET GitHub repository secret."
            exit 1
          fi
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}

      - name: Submit listed extension to AMO
        if: github.event_name == 'release'
        run: npm run publish:amo
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
